version: 2
updates:
  # .NET dependencies
  - package-ecosystem: "nuget"
    directory: "/src/PerformanceMonitorAnalyzer"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "MasayukiOzawa"
    assignees:
      - "MasayukiOzawa"
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "MasayukiOzawa"
    assignees:
      - "MasayukiOzawa"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"