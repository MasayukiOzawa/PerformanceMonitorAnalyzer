name: Release to Main

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'releaseブランチからmainブランチにマージしますか？'
        required: true
        default: 'false'
        type: choice
        options:
        - 'false'
        - 'true'

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'true' && github.ref == 'refs/heads/release'
    
    steps:
    - name: Checkout release branch
      uses: actions/checkout@v4
      with:
        ref: release
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Configure git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
    - name: Merge release to main
      run: |
        git checkout main
        git merge release --no-ff -m "Release merge from release branch"
        git push origin main
        
    - name: Create release tag
      run: |
        TAG_NAME="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
        git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
        git push origin "$TAG_NAME"