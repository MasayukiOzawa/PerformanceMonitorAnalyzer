name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to create or update the GitHub Release for
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: src\PerformanceMonitorAnalyzer\PerformanceMonitorAnalyzer.csproj
  SOLUTION_PATH: src\PerformanceMonitorAnalyzer\PerformanceMonitorAnalyzer.sln

jobs:
  release:
    name: Build and publish release ZIPs
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        shell: pwsh
        run: |
          $releaseTag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $releaseTag = "${{ inputs.tag_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            throw "Release tag was not provided."
          }
          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $env:SOLUTION_PATH

      - name: Test
        run: dotnet test $env:SOLUTION_PATH --configuration Debug --no-restore

      - name: Publish and package release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $runtimes = @("win-x64", "win-arm64")
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

          foreach ($runtime in $runtimes) {
            $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish\$runtime"
            dotnet publish $env:PROJECT_PATH `
              --configuration Release `
              --runtime $runtime `
              --self-contained true `
              --output $publishDir `
              -p:PublishSingleFile=true `
              -p:IncludeNativeLibrariesForSelfExtract=true `
              -p:PublishSingleFileOnBuild=false

            $exePath = Join-Path $publishDir "PerformanceMonitorAnalyzer.exe"
            $configPath = Join-Path $publishDir "config\counter-patterns.yaml"

            if (-not (Test-Path $exePath)) {
              throw "Missing release executable: $exePath"
            }
            if (-not (Test-Path $configPath)) {
              throw "Missing configuration file: $configPath"
            }

            $zipPath = Join-Path $artifactDir "PerformanceMonitorAnalyzer-$env:RELEASE_TAG-$runtime.zip"
            if (Test-Path $zipPath) {
              Remove-Item $zipPath -Force
            }

            Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath $zipPath -Force
          }

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $assetPaths = @(Get-ChildItem -Path artifacts -Filter "*.zip" |
            Sort-Object Name |
            ForEach-Object { $_.FullName })

          if ($assetPaths.Count -eq 0) {
            throw "No release ZIP files were created."
          }

          $releaseExists = $false
          try {
            gh release view $env:RELEASE_TAG *> $null
            $releaseExists = $LASTEXITCODE -eq 0
          }
          catch {
            $releaseExists = $false
          }

          if ($releaseExists) {
            gh release upload $env:RELEASE_TAG @assetPaths --clobber
          }
          else {
            gh release create $env:RELEASE_TAG @assetPaths --title $env:RELEASE_TAG --generate-notes --verify-tag
          }
