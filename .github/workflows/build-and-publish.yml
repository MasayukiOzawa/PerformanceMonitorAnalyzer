name: Build and Publish

on:
  push:
    branches: [ copilot, release ]
  pull_request:
    branches: [ release ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore src/PerformanceMonitorAnalyzer/PerformanceMonitorAnalyzer.csproj
      
    - name: Build application
      run: dotnet build src/PerformanceMonitorAnalyzer/PerformanceMonitorAnalyzer.csproj --configuration Release --no-restore
      
    - name: Publish single binary (win-x64)
      run: dotnet publish src/PerformanceMonitorAnalyzer/PerformanceMonitorAnalyzer.csproj --configuration Release --runtime win-x64 --self-contained true --output publish/win-x64
      
    - name: Publish single binary (win-x86)
      run: dotnet publish src/PerformanceMonitorAnalyzer/PerformanceMonitorAnalyzer.csproj --configuration Release --runtime win-x86 --self-contained true --output publish/win-x86
      
    - name: Publish single binary (win-arm64)
      run: dotnet publish src/PerformanceMonitorAnalyzer/PerformanceMonitorAnalyzer.csproj --configuration Release --runtime win-arm64 --self-contained true --output publish/win-arm64
      
    - name: Upload build artifacts (win-x64)
      uses: actions/upload-artifact@v4
      with:
        name: PerformanceMonitorAnalyzer-win-x64
        path: publish/win-x64/
        retention-days: 30
        
    - name: Upload build artifacts (win-x86)
      uses: actions/upload-artifact@v4
      with:
        name: PerformanceMonitorAnalyzer-win-x86
        path: publish/win-x86/
        retention-days: 30
        
    - name: Upload build artifacts (win-arm64)
      uses: actions/upload-artifact@v4
      with:
        name: PerformanceMonitorAnalyzer-win-arm64
        path: publish/win-arm64/
        retention-days: 30