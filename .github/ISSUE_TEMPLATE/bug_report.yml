name: バグ報告
description: 問題やバグを報告してください
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告をありがとうございます。問題をできるだけ詳しく記述してください。
  
  - type: input
    id: version
    attributes:
      label: バージョン
      description: 使用しているアプリケーションのバージョンは何ですか？
      placeholder: v1.0.0
    validations:
      required: true
  
  - type: input
    id: os
    attributes:
      label: オペレーティングシステム
      description: どのOSで問題が発生していますか？
      placeholder: Windows 11 22H2
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: 問題の説明
      description: 何が起こっているか詳しく説明してください
      placeholder: BLGファイルを読み込もうとすると...
    validations:
      required: true
  
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 問題を再現するための手順を教えてください
      placeholder: |
        1. アプリケーションを起動
        2. ファイルメニューから「BLGファイルを開く」を選択
        3. サンプルファイルを選択
        4. エラーが発生
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
      description: 何が起こることを期待していましたか？
    validations:
      required: true
  
  - type: textarea
    id: logs
    attributes:
      label: ログやエラーメッセージ
      description: 関連するログやエラーメッセージがあれば貼り付けてください
      render: shell
  
  - type: textarea
    id: additional
    attributes:
      label: 追加情報
      description: その他の関連情報があれば記載してください