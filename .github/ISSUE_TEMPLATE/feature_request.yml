name: 機能リクエスト
description: 新しい機能の提案をしてください
title: "[Feature]: "
labels: ["enhancement", "needs-discussion"]
body:
  - type: markdown
    attributes:
      value: |
        新しい機能の提案をありがとうございます。できるだけ詳しく説明してください。
  
  - type: textarea
    id: problem
    attributes:
      label: 解決したい問題
      description: どのような問題や課題を解決したいですか？
      placeholder: "現在、...ができないため困っています"
    validations:
      required: true
  
  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能や改善を提案しますか？
      placeholder: "...という機能があれば解決できると思います"
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に考えられる解決策はありますか？
  
  - type: textarea
    id: use-case
    attributes:
      label: 使用シナリオ
      description: この機能をどのように使用しますか？具体的な例を教えてください
      placeholder: |
        1. BLGファイルを読み込む
        2. 新しい機能を使って...
        3. 結果として...
  
  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      description: この機能の優先度は？
      options:
        - 低 (あると便利)
        - 中 (重要)
        - 高 (必須)
    validations:
      required: true
  
  - type: checkboxes
    id: contribution
    attributes:
      label: 貢献意欲
      description: この機能の実装に協力できますか？
      options:
        - label: 設計の議論に参加できます
        - label: テストに協力できます
        - label: 実装に協力できます
        - label: ドキュメント作成に協力できます