# scale は省略可能です。省略時は 1.0 が使用されます。
# graphType は lineChart / stackedAreaChart、valueMode は rawValue / deltaFromPrevious を指定できます。
patterns:
  - name: 基本システム監視
    description: CPU、メモリ、ディスクの基本的な監視項目
    graphType: lineChart
    valueMode: rawValue
    counters:
      - name: \Processor(_Total)\% Processor Time
        enabled: true
        scale: 1.0
      - name: \Memory\Available MBytes
        enabled: true
        scale: 1.0
      - name: \PhysicalDisk(_Total)\Disk Reads/sec
        enabled: true
        scale: 1.0
      - name: \PhysicalDisk(_Total)\Disk Writes/sec
        enabled: true
        scale: 1.0

  - name: クエリ実行時間
    graphType: stackedAreaChart
    valueMode: deltaFromPrevious
    counters:
      - name: \SQLServer:Batch Resp Statistics(Elapsed Time:Total(ms))\*
        enabled: true
        scale: 1.0

  - name: 詳細システム監視
    description: 詳細なシステム分析のための監視項目
    graphType: lineChart
    valueMode: rawValue
    counters:
      - name: \System\Context Switches/sec
        enabled: true
        scale: 1.0
      - name: \System\System Calls/sec
        enabled: true
        scale: 1.0
      - name: \Process(_Total)\Working Set
        enabled: true
        scale: 0.000001
      - name: \Process(_Total)\Private Bytes
        enabled: true
        scale: 0.000001

  - name: SQL Server Monitoring
    description: SQL Serverパフォーマンスの監視項目
    graphType: lineChart
    valueMode: rawValue
    counters:
      - name: \SQLServer:General Statistics\User Connections
        enabled: true
        scale: 1.0
      - name: \SQLServer:Buffer Manager\Buffer cache hit ratio
        enabled: true
        scale: 1.0
      - name: \SQLServer:SQL Statistics\Batch Requests/sec
        enabled: true
        scale: 1.0
      - name: \SQLServer:SQL Statistics\SQL Compilations/sec
        enabled: true
        scale: 1.0
      - name: \SQLServer:Locks(_Total)\Lock Waits/sec
        enabled: true
        scale: 1.0

  - name: SQL Server Lock Info
    description: SQL Serverパフォーマンスの監視項目
    graphType: lineChart
    valueMode: rawValue
    counters:
      - name: \SQLServer:Memory Manager\Lock Memory (KB)
        enabled: true
        scale: 0.0000001
      - name: \SQLServer:Memory Manager\Lock Blocks
        enabled: true
        scale: 0.0000001
      - name: \SQLServer:Memory Manager\Lock Blocks Allocated
        enabled: true
        scale: 0.0000001
      - name: \SQLServer:Memory Manager\Lock Owner Blocks
        enabled: true
        scale: 0.0000001
      - name: \SQLServer:Memory Manager\Lock Owner Blocks Allocated
        enabled: true
        scale: 0.0000001
      - name: \SQLServer:Locks(_Total)\Lock Requests/sec
        enabled: true
        scale: 0.00001
      - name: \SQLServer:Transactions\Longest Transaction Running Time
        enabled: true
        scale: 0.1
      - name: \SQLServer:Locks(Key)\Lock Requests/sec
        enabled: true
        scale: 0.1
      - name: \SQLServer:Locks(Metadata)\Lock Requests/sec
        enabled: true
        scale: 0.1
      - name: \SQLServer:Locks(Object)\Lock Requests/sec
        enabled: true
        scale: 0.1
      - name: \SQLServer:Locks(Page)\Lock Requests/sec
        enabled: true
        scale: 0.1
        